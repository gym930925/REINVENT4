run_type = "staged_learning"
device = "cuda:0"  # or "cpu"
tb_logdir = "tb_RL"

[parameters]
prior_file = "prior/reinvent.prior"
agent_file = "prior/reinvent.prior"   # or a TL checkpoint, e.g. output/tl_reinvent.model
summary_csv_prefix = "output/rl_run"
batch_size = 64
randomize_smiles = true
unique_sequences = true

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[diversity_filter]
type = "IdenticalMurckoScaffold"
bucket_size = 25
minscore = 0.4

# Stage 1: loose scoring — shape the chemical space broadly
[[stage]]
chkpt_file = "output/stage1.chkpt"
termination = "simple"
max_score = 0.6
min_steps = 25
max_steps = 300

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.custom_alerts]
[[stage.scoring.component.custom_alerts.endpoint]]
name = "Alerts"
params.smarts = [
    "[*;r{8-17}]",
    "[#8][#8]",
    "[#6;+]",
    "[#16][#16]"
]

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 1.0

[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name = "MW"
weight = 1.0
transform.type = "double_sigmoid"
transform.low = 200.0
transform.high = 500.0
transform.coef_div = 500.0
transform.coef_si = 20.0
transform.coef_se = 20.0

# Stage 2: tighter scoring — add more demanding objectives
[[stage]]
chkpt_file = "output/stage2.chkpt"
termination = "simple"
max_score = 0.8
min_steps = 25
max_steps = 500

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.custom_alerts]
[[stage.scoring.component.custom_alerts.endpoint]]
name = "Alerts"
params.smarts = [
    "[*;r{8-17}]",
    "[#8][#8]",
    "[#6;+]",
    "[#16][#16]"
]

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 1.0

[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name = "MW"
weight = 1.0
transform.type = "double_sigmoid"
transform.low = 200.0
transform.high = 500.0
transform.coef_div = 500.0
transform.coef_si = 20.0
transform.coef_se = 20.0

[[stage.scoring.component]]
[stage.scoring.component.TPSA]
[[stage.scoring.component.TPSA.endpoint]]
name = "TPSA"
weight = 1.0
transform.type = "double_sigmoid"
transform.low = 40.0
transform.high = 130.0
transform.coef_div = 130.0
transform.coef_si = 20.0
transform.coef_se = 20.0

[[stage.scoring.component]]
[stage.scoring.component.RDKitDescriptors]
[[stage.scoring.component.RDKitDescriptors.endpoint]]
name = "RotBonds"
weight = 1.0
params.descriptor = "NumRotatableBonds"
transform.type = "reverse_sigmoid"
transform.low = 0.0
transform.high = 10.0
transform.k = 0.5
